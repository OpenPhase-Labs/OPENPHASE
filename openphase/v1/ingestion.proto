// OpenPhase v1 — gRPC Ingestion Service
// Defines the standard server-side gRPC contract for accepting
// pushed OpenPhase telemetry from field devices.
//
// Devices publish:
//   - PublishUpdate(IntersectionUpdate)         — single multi-payload envelope
//   - PublishBatch(CompactEventBatch)           — single delta-encoded IHR batch
//   - StreamBatches(stream CompactEventBatch)   — long-lived streaming push
//
// Each RPC returns a `PublishAck` with the count of accepted events
// and an error string (empty on success).
//
