syntax = "proto3";

package openphase.v1;

import "openphase/v1/common.proto";

// Acknowledgement returned by every IngestionService RPC.
message PublishAck {
  uint32 events_accepted = 1;       // Number of events successfully decoded and persisted
  string error = 2;                 // Empty on success; human-readable error otherwise
}

// gRPC service for pushing OpenPhase telemetry to an ingestion server.
//
// Transport-agnostic: the same `IntersectionUpdate` and `CompactEventBatch`
// messages used over NATS/MQTT travel here unchanged.
service IngestionService {
  // Push a single multi-payload update (SPaT, IHR event, health, security,
  // discovery, fault, controller config/status). Use for low-volume or
  // mixed-payload publishing where each message stands alone.
  rpc PublishUpdate(IntersectionUpdate) returns (PublishAck);

  // Push a single batch of IHR events with delta-encoded timestamps.
  // Use for medium-volume periodic pushes (e.g., every few seconds).
  rpc PublishBatch(CompactEventBatch) returns (PublishAck);

  // Long-lived client-streaming push of IHR event batches. Devices keep
  // the stream open and push batches as they're produced. Server returns
  // a single PublishAck when the stream closes (cumulative count). Use
  // for high-volume continuous telemetry (the common ATSPM streaming case).
  rpc StreamBatches(stream CompactEventBatch) returns (PublishAck);
}
