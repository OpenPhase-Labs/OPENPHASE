syntax = "proto3";

package openphase.v1;

// Security: Veto Logic & Threat Detection
message SecurityAlert {
  AlertLevel level = 1;                 // Severity classification
  string source = 2;                    // Alert source (e.g., "SNIFFER", "PALO_ALTO", "MMU_CONFLICT")
  string description = 3;               // Human-readable alert description
  bytes physical_fingerprint = 4;       // RF signal characteristics (for spoof detection)

  // Optional: structured threat metadata
  ThreatType threat_type = 10;
  string attacker_signature = 11;       // Known attack pattern identifier
}

enum AlertLevel {
  ALERT_LEVEL_UNSPECIFIED = 0;
  INFO = 1;                             // Informational (logged, no action)
  WARNING = 2;                          // Potential spoofing or anomaly
  CRITICAL = 3;                         // MMU conflict, physical breach, or confirmed attack
}

enum ThreatType {
  THREAT_TYPE_UNSPECIFIED = 0;
  GPS_SPOOFING = 1;                     // GPS signal manipulation
  TSP_REPLAY_ATTACK = 2;                // Transit priority request replay
  PREEMPT_SPOOF = 3;                    // Emergency vehicle preemption spoof
  MMU_CONFLICT = 4;                     // Malfunction Management Unit detected conflicting greens
  NETWORK_INTRUSION = 5;                // Firewall/IDS alert (Palo Alto, etc.)
}
