syntax = "proto3";

package openphase.v1;

// Discovery: Self-Learning Unmapped Bits
message DiscoveryPacket {
  uint32 sdlc_address = 1;              // SDLC device address (0x00-0x0F=BIU, 0x20=MMU)
  uint32 byte_index = 2;                // Byte offset in SDLC frame payload
  uint32 bit_index = 3;                 // Bit position within byte (0-7)
  bool old_state = 4;                   // Previous bit state (0 or 1)
  bool new_state = 5;                   // New bit state after transition
  bytes frame_context = 6;              // Minimal frame context (surrounding bytes, not full raw frame)
  Direction direction = 7;              // TX (controller->BIU) or RX (BIU->controller)

  // Cloud learning: cross-reference with controller FTP logs
  string suspected_event = 10;          // If cloud heuristic matches (e.g., "PHASE_2_GREEN")
  float confidence = 11;                // Confidence score (0.0-1.0) if auto-mapped
}

enum Direction {
  DIRECTION_UNSPECIFIED = 0;
  TX = 1;                               // Controller -> BIU (poll commands, output states)
  RX = 2;                               // BIU -> Controller (detector calls, status responses)
}
