// OpenPhase v1 — Indiana Hi-Resolution (IHR) Event Logging
// The "Nervous System" — 2M+ events/day for ATSPM analytics.
//
// EventType enum values are Indiana Hi-Resolution Data Logger event codes
// per Sturdevant et al., "Indiana Traffic Signal Hi Resolution Data Logger
// Enumerations," INDOT/Purdue, November 2012 (doi:10.4231/K4RN35SH).
//
// Per the IHR spec, an event log entry is exactly two 8-bit fields:
// Event Code (0-255) and Parameter (0-255). Intersection identifier and
// timestamp are carried by the outer envelope (`IntersectionUpdate` for
// single events, `CompactEventBatch` for batched transport).
